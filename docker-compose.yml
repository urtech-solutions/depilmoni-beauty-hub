services:
  postgres:
    image: postgres:16-alpine
    container_name: depilmoni-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: depilmoni
      POSTGRES_PASSWORD: depilmoni
      POSTGRES_DB: depilmoni_storefront
    ports:
      - "5432:5432"
    volumes:
      - depilmoni-postgres:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U depilmoni"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: depilmoni-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - depilmoni-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  depilmoni-postgres:
  depilmoni-redis:
